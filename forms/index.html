<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Diagnóstico · Heaven</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body {
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(40,90,180,0.22), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(59,158,255,0.10), transparent 60%),
      var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'Inter', sans-serif;
  }

  /* ===== Header ===== */
  .funnel-header {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(7, 7, 11, 0.6);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .funnel-header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .funnel-header .logo img { height: 80px; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 16px;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    border-radius: 999px;
    transition: all .25s cubic-bezier(.2,.7,.2,1);
  }
  .back-link:hover {
    color: var(--text);
    background: rgba(59, 158, 255, 0.1);
    border-color: var(--border-strong);
    transform: translateX(-3px);
  }

  /* ===== Main ===== */
  .funnel-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 36px 20px;
    position: relative;
  }

  /* ===== Chat container ===== */
  .chat-wrap {
    width: 100%;
    max-width: 540px;
    background: linear-gradient(180deg, var(--surface), var(--bg-3));
    border: 1px solid var(--border);
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 24px 60px -20px rgba(0,0,0,0.7),
      0 0 80px -30px var(--accent-glow);
    display: flex;
    flex-direction: column;
    height: min(720px, 80vh);
    position: relative;
    opacity: 0;
    transform: translateY(16px);
    animation: chatIn .7s cubic-bezier(.2,.7,.2,1) .15s forwards;
  }
  @keyframes chatIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Chat header (inside the chat card) ===== */
  .chat-header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.35);
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .chat-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(59,158,255,0.1);
    border: 1px solid rgba(59,158,255,0.25);
    display: grid;
    place-items: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .chat-avatar img {
    width: 36px; height: 36px;
    object-fit: contain;
  }
  .chat-meta { flex: 1; min-width: 0; }
  .chat-meta strong {
    display: block;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .chat-meta .status {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--text-mute);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .chat-meta .status-dot {
    width: 8px; height: 8px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(74,222,128,0.6);
    animation: statusPulse 2s ease-in-out infinite;
  }
  @keyframes statusPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(74,222,128,0.6); }
    50% { box-shadow: 0 0 14px rgba(74,222,128,0.9); }
  }

  /* ===== Chat body (messages) ===== */
  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-body::-webkit-scrollbar { width: 6px; }
  .chat-body::-webkit-scrollbar-track { background: transparent; }
  .chat-body::-webkit-scrollbar-thumb {
    background: rgba(59,158,255,0.2);
    border-radius: 3px;
    border: none;
  }

  .msg {
    display: flex;
    max-width: 82%;
    animation: msgIn .35s cubic-bezier(.2,.7,.2,1);
  }
  .msg-bot { align-self: flex-start; }
  .msg-user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .msg-bot .msg-bubble {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }
  .msg-bot .msg-bubble strong { color: var(--accent); font-weight: 600; }
  .msg-user .msg-bubble {
    background: linear-gradient(180deg, #4ba6ff, #2b7ede);
    border: 1px solid rgba(255,255,255,0.18);
    border-bottom-right-radius: 4px;
    color: #fff;
    box-shadow: 0 6px 18px -8px var(--accent-glow);
    font-weight: 500;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Typing indicator */
  .msg.typing .msg-bubble {
    padding: 14px 16px;
    display: inline-flex;
    gap: 5px;
    align-items: center;
  }
  .msg.typing .msg-bubble span {
    width: 6px; height: 6px;
    background: var(--text-mute);
    border-radius: 50%;
    animation: typingDot 1.2s ease-in-out infinite;
  }
  .msg.typing .msg-bubble span:nth-child(2) { animation-delay: .15s; }
  .msg.typing .msg-bubble span:nth-child(3) { animation-delay: .3s; }
  @keyframes typingDot {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* ===== Chat input (sticky bottom) ===== */
  .chat-input {
    padding: 14px 18px 16px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
  }
  .chat-input.hidden { display: none; }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .input-row input,
  .input-row select {
    flex: 1;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 13px 18px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    transition: all .2s;
    min-width: 0;
  }
  .input-row input:focus,
  .input-row select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: rgba(0,0,0,0.6);
  }
  .input-row input.error { border-color: #ff5b5b; }
  .send-btn {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(180deg, #4ba6ff, #2b7ede);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff;
    cursor: pointer;
    display: grid;
    place-items: center;
    box-shadow: 0 8px 22px -8px var(--accent-glow);
    transition: all .25s cubic-bezier(.2,.7,.2,1);
  }
  .send-btn:hover { transform: translateY(-1px) scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 18px; height: 18px; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .pills-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pill-option {
    padding: 12px 16px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all .2s cubic-bezier(.2,.7,.2,1);
  }
  .pill-option:hover {
    border-color: rgba(59,158,255,0.45);
    background: rgba(59,158,255,0.08);
    transform: translateX(4px);
  }
  .pill-option:active { transform: scale(0.98); }

  .err-msg {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #ff7373;
    margin-top: 8px;
    min-height: 16px;
    padding-left: 4px;
  }

  /* End-of-funnel back link inside chat input */
  .end-row {
    display: flex;
    justify-content: center;
  }
  .end-row a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    color: var(--text-dim);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    transition: all .2s;
  }
  .end-row a:hover {
    color: var(--text);
    background: rgba(59,158,255,0.08);
  }

  /* ===== Footer ===== */
  .funnel-footer {
    padding: 22px 0;
    text-align: center;
    color: var(--text-mute);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 540px) {
    .funnel-header { padding: 12px 0; }
    .funnel-header .logo img { height: 60px; }
    .back-link { padding: 7px 12px; font-size: 12px; }
    .back-link span { display: none; }
    .funnel-main { padding: 16px 12px; }
    .chat-wrap { height: calc(100vh - 130px); border-radius: 18px; }
    .chat-header { padding: 12px 16px; }
    .chat-avatar { width: 40px; height: 40px; }
    .chat-avatar img { width: 32px; height: 32px; }
    .chat-meta strong { font-size: 15px; }
    .chat-body { padding: 18px 14px; }
    .msg { max-width: 88%; }
    .msg-bubble { font-size: 14px; }
    .chat-input { padding: 12px 14px 14px; }
    .input-row input { padding: 12px 16px; font-size: 14px; }
    .pill-option { padding: 11px 14px; font-size: 13.5px; }
  }
</style>
</head>
<body>

<header class="funnel-header">
  <div class="container">
    <a class="logo" href="../" aria-label="Heaven Agência">
      <img src="../assets/heaven-logo.webp" alt="Heaven Agência" />
    </a>
    <a class="back-link" href="../">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Voltar ao site</span>
    </a>
  </div>
</header>

<main class="funnel-main">
  <div class="chat-wrap">
    <div class="chat-header">
      <div class="chat-avatar">
        <img src="../assets/heaven-logo.webp" alt="Heaven" />
      </div>
      <div class="chat-meta">
        <strong>Heaven Diagnóstico</strong>
        <span class="status"><span class="status-dot"></span>Online agora</span>
      </div>
    </div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-input" id="chatInput"></div>
  </div>
</main>

<footer class="funnel-footer">
  <div class="container">© 2026 Heaven Agência de Marketing · Recife · João Pessoa</div>
</footer>

<script>
  /* ============================================================
     CONFIGURAÇÃO DO FUNIL — chat conversacional
     ============================================================ */
  const WEBHOOK_URL = 'https://mkhiykxsfbcbybxhqlkj.supabase.co/functions/v1/lead-webhook?token=3465ec6e-6dfb-4894-a9ed-a6232ecba255';

  const sessionId = (crypto.randomUUID && crypto.randomUUID()) ||
    `s_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

  const state = {
    nome: '',
    celular: '',
    email: '',
    empresa: '',
    faturamento: '',
    aceita_minimo: null,
    qualificado: null,
    motivo: null,
    status: 'iniciado'
  };

  /* ============================================================
     PERGUNTAS — mensagem por mensagem
     ============================================================ */
  const questions = [
    {
      id: 'nome',
      bot: 'Olá! 👋 Sou da Heaven. Pra começarmos seu diagnóstico, como você se chama?',
      type: 'text',
      placeholder: 'Seu nome',
      autocomplete: 'name',
      validate: v => v.trim().length < 3 ? 'Coloca seu nome completo, por favor.' : null
    },
    {
      id: 'celular',
      bot: s => `Prazer, ${s.nome.split(' ')[0]}! Me passa seu WhatsApp pra agendarmos a ligação.`,
      type: 'tel',
      placeholder: '(00) 00000-0000',
      autocomplete: 'tel',
      mask: 'phone',
      validate: v => v.replace(/\D/g, '').length < 10 ? 'WhatsApp inválido.' : null
    },
    {
      id: 'email',
      bot: 'Show. E o seu melhor e-mail?',
      type: 'email',
      placeholder: 'seu@email.com',
      autocomplete: 'email',
      validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) ? null : 'E-mail inválido.'
    },
    {
      id: 'empresa',
      bot: 'Perfeito. Qual o nome da sua empresa?',
      type: 'text',
      placeholder: 'Nome da empresa',
      validate: v => v.trim().length < 2 ? 'Informe o nome da empresa.' : null
    },
    {
      id: 'faturamento',
      bot: 'Pra te direcionar pra estratégia certa, qual o <strong>faturamento mensal</strong> da sua empresa hoje?',
      type: 'pills',
      options: [
        { value: '0-5',    label: 'Até R$ 5.000' },
        { value: '5-20',   label: 'R$ 5.000 a R$ 20.000' },
        { value: '30-50',  label: 'R$ 30.000 a R$ 50.000' },
        { value: '50-100', label: 'R$ 50.000 a R$ 100.000' },
        { value: '100+',   label: 'Acima de R$ 100.000' }
      ]
    },
    {
      id: 'aceita_minimo',
      bot: 'Nosso projeto mínimo de marketing é de <strong>R$ 1.600/mês</strong>. Você está disponível pra investir esse valor mensal?',
      type: 'pills',
      showIf: s => s.faturamento === '5-20',
      options: [
        { value: 'sim', label: 'Sim, estou disponível' },
        { value: 'nao', label: 'Ainda não' }
      ]
    }
  ];

  /* ============================================================
     ENVIO DE LEAD — UMA VEZ POR SESSÃO (sem duplicação)
     ============================================================ */
  let leadSent = false;
  function sendLead(force = false, useBeacon = false) {
    if (leadSent && !force) return;
    /* Só envia se houver dados mínimos OU for o final do funil */
    const hasData = state.nome || state.email || state.celular;
    if (!hasData) return;

    const phoneDigits = (state.celular || '').replace(/\D/g, '');

    const payload = {
      /* CRM identifies leads by these primary fields */
      name: state.nome,
      phone: phoneDigits,
      email: state.email,
      company: state.empresa,
      revenue: state.faturamento,

      /* Funnel context — todas as respostas do forms */
      agree_minimum: state.aceita_minimo,
      qualified: state.qualificado,
      status: state.status,
      reason: state.motivo,

      /* === ROTEAMENTO PARA COLUNA "Google Ads Leads" no CRM === */
      stage: 'Google Ads Leads',
      stage_name: 'Google Ads Leads',
      stage_id: 'google_ads_leads',
      stage_slug: 'google_ads_leads',
      etapa: 'Google Ads Leads',
      column: 'Google Ads Leads',
      column_name: 'Google Ads Leads',
      kanban_column: 'Google Ads Leads',
      pipeline_stage: 'Google Ads Leads',
      funnel_stage: 'Google Ads Leads',
      phase: 'Google Ads Leads',
      fase: 'Google Ads Leads',
      table: 'google_ads',
      source: 'google_ads',
      tag: 'google_ads',
      origin: 'heaven-landing-funnel',

      /* Snapshot completo das respostas (caso o CRM use field map dinâmico) */
      answers: {
        nome: state.nome,
        celular: state.celular,
        email: state.email,
        empresa: state.empresa,
        faturamento: state.faturamento,
        aceita_minimo: state.aceita_minimo,
        qualificado: state.qualificado,
        motivo: state.motivo
      },

      /* Meta */
      session_id: sessionId,
      page_url: window.location.href,
      referrer: document.referrer || null,
      timestamp: new Date().toISOString()
    };

    const body = JSON.stringify(payload);
    leadSent = true;

    try {
      if (useBeacon && navigator.sendBeacon) {
        navigator.sendBeacon(WEBHOOK_URL, new Blob([body], { type: 'application/json' }));
        return;
      }
      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body,
        keepalive: true,
        mode: 'no-cors'
      }).catch(err => console.warn('Lead webhook send failed', err));
    } catch (e) {
      console.warn('sendLead error', e);
    }
  }

  /* Envia se usuário sair sem completar (com beacon, garante o envio) */
  function handleAbandon() {
    if (leadSent) return;
    if (!state.nome && !state.email && !state.celular) return;
    state.status = state.status === 'completo' ? 'completo' : 'abandonado';
    sendLead(true, true);
  }
  window.addEventListener('pagehide', handleAbandon);
  window.addEventListener('beforeunload', handleAbandon);

  /* ============================================================
     RENDERIZAÇÃO DO CHAT
     ============================================================ */
  const chatBody = document.getElementById('chatBody');
  const chatInput = document.getElementById('chatInput');

  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatBody.scrollTop = chatBody.scrollHeight;
    });
  }

  function addBotMessage(html) {
    const msg = document.createElement('div');
    msg.className = 'msg msg-bot';
    msg.innerHTML = `<div class="msg-bubble">${html}</div>`;
    chatBody.appendChild(msg);
    scrollToBottom();
  }

  function addUserMessage(text) {
    const msg = document.createElement('div');
    msg.className = 'msg msg-user';
    msg.innerHTML = `<div class="msg-bubble"></div>`;
    msg.querySelector('.msg-bubble').textContent = text;
    chatBody.appendChild(msg);
    scrollToBottom();
  }

  function showTyping(durationMs, cb) {
    const msg = document.createElement('div');
    msg.className = 'msg msg-bot typing';
    msg.innerHTML = `<div class="msg-bubble"><span></span><span></span><span></span></div>`;
    chatBody.appendChild(msg);
    scrollToBottom();
    setTimeout(() => {
      msg.remove();
      cb && cb();
    }, durationMs);
  }

  /* ============================================================
     INPUT RENDERS — text, tel, email, pills
     ============================================================ */
  function renderInput(q) {
    chatInput.classList.remove('hidden');

    if (q.type === 'pills') {
      chatInput.innerHTML = `
        <div class="pills-col" id="pillsCol"></div>
        <div class="err-msg" id="errMsg"></div>
      `;
      const col = document.getElementById('pillsCol');
      q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'pill-option';
        btn.textContent = opt.label;
        btn.dataset.value = opt.value;
        btn.dataset.label = opt.label;
        btn.addEventListener('click', () => {
          handleAnswer(q, opt.value, opt.label);
        });
        col.appendChild(btn);
      });
    } else {
      const inputType = q.type === 'tel' ? 'tel' : (q.type === 'email' ? 'email' : 'text');
      chatInput.innerHTML = `
        <div class="input-row">
          <input
            id="chatField"
            type="${inputType}"
            placeholder="${q.placeholder || ''}"
            autocomplete="${q.autocomplete || 'off'}"
            ${q.type === 'tel' ? 'inputmode="numeric"' : ''}
            autofocus />
          <button type="button" class="send-btn" id="sendBtn" aria-label="Enviar">
            <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="err-msg" id="errMsg"></div>
      `;
      const field = document.getElementById('chatField');
      const sendBtn = document.getElementById('sendBtn');

      if (q.mask === 'phone') {
        field.addEventListener('input', e => {
          let v = e.target.value.replace(/\D/g, '').slice(0, 11);
          if (v.length > 6) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
          else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;
          else if (v.length > 0) v = `(${v}`;
          e.target.value = v;
        });
      }

      const submit = () => {
        const v = field.value.trim();
        const err = q.validate(v);
        const errEl = document.getElementById('errMsg');
        if (err) {
          field.classList.add('error');
          errEl.textContent = err;
          field.focus();
          return;
        }
        handleAnswer(q, v, v);
      };

      sendBtn.addEventListener('click', submit);
      field.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); submit(); }
      });
      field.addEventListener('input', () => {
        field.classList.remove('error');
        document.getElementById('errMsg').textContent = '';
      });

      setTimeout(() => field.focus(), 50);
    }
  }

  /* ============================================================
     FLUXO PRINCIPAL
     ============================================================ */
  let qIndex = 0;

  function handleAnswer(q, rawValue, displayLabel) {
    /* Save value */
    state[q.id] = rawValue;
    /* Show as user bubble */
    addUserMessage(displayLabel);
    /* Hide input while typing */
    chatInput.classList.add('hidden');
    /* Advance */
    qIndex++;
    setTimeout(askNext, 350);
  }

  function askNext() {
    /* Skip questions whose `showIf` returns false */
    while (qIndex < questions.length) {
      const q = questions[qIndex];
      if (q.showIf && !q.showIf(state)) {
        qIndex++;
        continue;
      }
      break;
    }

    if (qIndex >= questions.length) {
      finishFunnel();
      return;
    }

    const q = questions[qIndex];
    showTyping(900 + Math.random() * 400, () => {
      const text = typeof q.bot === 'function' ? q.bot(state) : q.bot;
      addBotMessage(text);
      setTimeout(() => renderInput(q), 250);
    });
  }

  /* ============================================================
     FINALIZAÇÃO — roteamento + envio único
     ============================================================ */
  function finishFunnel() {
    const f = state.faturamento;
    let qualified, reason;

    if (f === '0-5') {
      qualified = false;
      reason = 'faturamento_baixo';
    } else if (f === '5-20') {
      if (state.aceita_minimo === 'sim') { qualified = true; reason = 'aceitou_minimo'; }
      else                                { qualified = false; reason = 'recusou_minimo'; }
    } else if (f === '100+') {
      qualified = true; reason = 'ultra_qualificado';
    } else {
      qualified = true; reason = 'qualificado';
    }

    state.qualificado = qualified;
    state.motivo = reason;
    state.status = 'completo';

    /* ÚNICO envio do lead */
    sendLead(true);

    /* Mensagens finais por bubble */
    const firstName = (state.nome || '').split(' ')[0] || 'parceiro';
    const finalMessages = qualified
      ? [
          `Perfeito, ${firstName}! 🎯`,
          `Recebemos suas informações.`,
          `Em até <strong>24 horas</strong> um especialista da Heaven entra em contato pelo WhatsApp ${state.celular}. Fica de olho!`
        ]
      : [
          `Obrigado pelo seu interesse, ${firstName}.`,
          `No momento o nosso modelo de marketing <strong>não é o ideal</strong> pra esse estágio. Trabalhamos com tráfego pago e estrutura comercial, e isso exige um investimento mínimo pra entregar resultado real.`,
          `Quando seu cenário mudar, é só voltar pra falar com a gente.`
        ];

    let i = 0;
    const showFinal = () => {
      if (i >= finalMessages.length) {
        chatInput.innerHTML = `
          <div class="end-row">
            <a href="../">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Voltar ao site
            </a>
          </div>
        `;
        chatInput.classList.remove('hidden');
        return;
      }
      showTyping(900 + Math.random() * 350, () => {
        addBotMessage(finalMessages[i]);
        i++;
        setTimeout(showFinal, 450);
      });
    };
    showFinal();
  }

  /* ============================================================
     INICIA O CHAT
     ============================================================ */
  setTimeout(askNext, 700);
</script>
</body>
</html>

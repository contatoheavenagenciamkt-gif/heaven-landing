<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Juan Oliver · Links</title>
<meta name="description" content="Links oficiais de Juan Oliver — Heaven Agência de Marketing." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://mkhiykxsfbcbybxhqlkj.supabase.co" />
<link rel="preload" as="image" href="../assets/heaven-logo.webp" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #07070b;
    --surface: #14161f;
    --border: rgba(80, 130, 220, 0.18);
    --text: #e9edf5;
    --text-dim: #a4abbc;
    --accent: #3b9eff;
    --accent-glow: rgba(59, 158, 255, 0.35);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(59, 158, 255, 0.12), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 64px;
  }
  .lb-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .lb-logo {
    width: 96px;
    height: 96px;
    object-fit: cover;
    object-position: center 22%;
    border-radius: 50%;
    border: 2px solid var(--border);
    box-shadow: 0 0 60px -12px var(--accent-glow);
  }
  .lb-name {
    font-family: "Outfit", "Inter", sans-serif;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: -0.01em;
    margin-top: 16px;
  }
  .lb-handle { color: var(--text-dim); font-size: 14px; margin-top: 2px; }

  .lb-links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 34px;
  }
  .lb-card {
    display: block;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px -16px rgba(0, 0, 0, 0.8);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    line-height: 0;
  }
  .lb-card:hover,
  .lb-card:focus-visible {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 16px 40px -18px var(--accent-glow);
    outline: none;
  }
  .lb-img { width: 100%; height: auto; display: block; }

  .lb-empty {
    width: 100%;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px 16px;
  }

  .lb-foot {
    margin-top: 40px;
    color: var(--text-dim);
    font-size: 12px;
    opacity: 0.8;
  }
  @media (prefers-reduced-motion: reduce) {
    .lb-card { transition: none; }
  }
</style>
</head>
<body>
  <main class="lb-wrap">
    <img class="lb-logo" src="../assets/linkbio-perfil.jpg" alt="Juan Oliver" decoding="async" />
    <h1 class="lb-name">Juan Oliver</h1>
    <p class="lb-handle">@juan.oliver_</p>

    <nav class="lb-links" id="linkbio-links" aria-label="Links da Heaven"></nav>

    <p class="lb-foot">© Heaven Agência de Marketing</p>
  </main>

  <script src="config.js"></script>
  <script src="linkbio.js"></script>
</body>
</html>

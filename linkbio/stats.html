<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Heaven · Acessos do Link na Bio</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://mkhiykxsfbcbybxhqlkj.supabase.co" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #07070b; --surface: #14161f; --surface-2: #1b1e2a;
    --border: rgba(80,130,220,.18); --text: #e9edf5; --text-dim: #a4abbc;
    --accent: #3b9eff; --emerald: #10b981; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(120% 60% at 50% -10%, rgba(59,158,255,.10), transparent 60%), var(--bg);
    color: var(--text); font-family: "Inter", system-ui, sans-serif;
    min-height: 100dvh; padding: 40px 20px 64px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-family: "Outfit","Inter",sans-serif; font-size: 24px; letter-spacing: -.01em; }
  .sub { color: var(--text-dim); font-size: 14px; margin-top: 4px; }

  .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin: 28px 0; }
  @media (max-width: 560px){ .cards { grid-template-columns: 1fr; } }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
  }
  .card .v { font-size: 28px; font-weight: 700; font-family: "Outfit","Inter",sans-serif; }
  .card .l { color: var(--text-dim); font-size: 13px; margin-top: 2px; }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 4px; margin-top: 22px;
  }
  .panel h2 { font-size: 14px; color: var(--text-dim); font-weight: 600; padding: 12px 18px 6px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 11px 18px; }
  th { color: var(--text-dim); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  tbody tr { border-top: 1px solid var(--border); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .slug { font-weight: 600; }
  .bar { height: 6px; border-radius: 4px; background: var(--surface-2); overflow: hidden; min-width: 60px; }
  .bar > i { display: block; height: 100%; background: var(--accent); }

  .gate { max-width: 320px; margin: 80px auto; text-align: center; }
  .gate input {
    width: 100%; margin-top: 14px; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px;
  }
  .gate button {
    width: 100%; margin-top: 10px; padding: 12px; border-radius: 12px; border: 0;
    background: var(--accent); color: #04101f; font-weight: 600; font-size: 15px; cursor: pointer;
  }
  .msg { color: var(--text-dim); font-size: 14px; margin-top: 16px; }
  .err { color: #fb7185; }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="wrap">
    <!-- Gate de senha (opcional) -->
    <div id="gate" class="gate hidden">
      <h1>Acessos · Link na Bio</h1>
      <input id="gate-pass" type="password" placeholder="Senha do painel" autocomplete="off" />
      <button id="gate-btn">Entrar</button>
      <p id="gate-err" class="msg err hidden">Senha incorreta.</p>
    </div>

    <!-- Painel -->
    <div id="panel" class="hidden">
      <h1>Acessos · Link na Bio</h1>
      <p class="sub">Página <code>/linkbio</code> — visitas e cliques por mês.</p>

      <div class="cards">
        <div class="card"><div class="v" id="c-visits">—</div><div class="l">Visitas no mês</div></div>
        <div class="card"><div class="v" id="c-clicks">—</div><div class="l">Cliques no mês</div></div>
        <div class="card"><div class="v" id="c-ctr">—</div><div class="l">Cliques / visitas</div></div>
      </div>

      <div class="panel">
        <h2>Cliques por link (mês atual · total)</h2>
        <table>
          <thead><tr><th>Link</th><th></th><th class="num">No mês</th><th class="num">Total</th></tr></thead>
          <tbody id="t-links"></tbody>
        </table>
      </div>

      <div class="panel">
        <h2>Por mês (últimos 12 meses)</h2>
        <table>
          <thead><tr><th>Mês</th><th class="num">Visitas</th><th class="num">Cliques</th></tr></thead>
          <tbody id="t-months"></tbody>
        </table>
      </div>

      <p id="state" class="msg"></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="stats.js"></script>
</body>
</html>
